name: Publish Demo Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish-demo:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Generate static demo dashboard
        run: |
          chmod +x scripts/*.sh
          ./scripts/run_full_demo.sh

      - name: Prepare Pages artifact
        run: |
          mkdir -p site/demo
          cp output/dashboard.html site/demo/index.html
          cp output/desk_summary.md site/demo/
          cp output/*.csv site/demo/
          cp -r output/plots site/demo/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=demo/">
            <title>Fixed Income Desk Quant Platform</title>
          </head>
          <body>
            <p><a href="demo/">Open the Phase 1 demo dashboard</a></p>
          </body>
          </html>
          HTML
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
